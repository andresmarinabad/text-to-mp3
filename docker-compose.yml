services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/andresmarinabad/epub-to-audiobook/backend:latest
    restart: unless-stopped
    command: uvicorn audiobook.infrastructure.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    volumes:
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: ghcr.io/andresmarinabad/epub-to-audiobook/backend:latest
    restart: unless-stopped
    entrypoint: ["/bin/bash", "/app/entrypoint-worker.sh"]
    env_file: .env
    volumes:
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy

  flower:
    image: ghcr.io/andresmarinabad/epub-to-audiobook/backend:latest
    restart: unless-stopped
    command: celery -A audiobook.infrastructure.celery.app:celery_app flower --port=5555
    env_file: .env
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/andresmarinabad/epub-to-audiobook/frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

volumes:
  redis_data:
